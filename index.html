<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Fitness Market</title>
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        /* Эффект стекла (Glassmorphism) */
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            padding: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        h2 { margin-top: 0; }

        .product {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            margin: 10px 0;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        button {
            background: #ffffff;
            color: #000;
            border: none;
            padding: 8px 16px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="glass-card">
    <h2>🍎 Fitness Market</h2>
    
    <div class="product">
        <span>Протеиновый батончик</span>
        <span>150 ₽</span>
        <button onclick="alert('Добавлено!')">+</button>
    </div>

    <div class="product">
        <span>Сывороточный протеин</span>
        <span>2500 ₽</span>
        <button onclick="alert('Добавлено!')">+</button>
    </div>

    <div class="product">
        <span>BCAA (500г)</span>
        <span>1800 ₽</span>
        <button onclick="alert('Добавлено!')">+</button>
    </div>
</div>

</body>
</html>
