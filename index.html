<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Elite | Market</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --glass: rgba(255, 255, 255, 0.05); --accent: #7c3aed; }
        body { margin: 0; background: #050505; color: white; font-family: 'Inter', sans-serif; }
        
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        
        /* Сетка товаров */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; margin-top: 40px; }
        
        .card { 
            background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px; padding: 20px; text-align: center; transition: 0.4s;
        }
        .card:hover { transform: translateY(-10px); border-color: var(--accent); }
        .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 20px; margin-bottom: 15px; }

        /* Плавающая корзина */
        .fab { 
            position: fixed; bottom: 30px; right: 30px; background: var(--accent); padding: 20px 30px;
            border-radius: 50px; cursor: pointer; border: none; color: white; font-weight: 600; box-shadow: 0 10px 25px rgba(124,58,237,0.4); z-index: 100;
        }

        /* Футер (О нас) */
        footer { margin-top: 80px; padding: 60px 20px; background: rgba(255,255,255,0.02); border-top: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .about-section { max-width: 600px; margin: 0 auto; }
    </style>
</head>
<body>

<div class="container">
    <header style="padding: 40px 0; text-align: center;">
        <h1 style="font-size: 3rem; margin: 0;">Fitness Elite</h1>
    </header>

    <div class="grid" id="product-grid"></div>
</div>

<footer>
    <div class="about-section">
        <h2>О нас</h2>
        <p style="color: #888;">Мы — премиальный маркет спортивного питания. Помогаем атлетам достигать пиковых результатов с 2026 года. Только лучшее качество для вашего тела.</p>
    </div>
</footer>

<button class="fab" onclick="alert('Корзина пока пуста!')">🛒 Корзина</button>

<script>
    const products = [
        {name: "Протеин", price: "2 500 ₽", img: "https://images.unsplash.com/photo-1693996045899-7cf0ac0229c7?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8M3x8d2hleSUyMHByb3RlaW58ZW58MHx8MHx8fDA%3D"},
        {name: "Креатин", price: "1 200 ₽", img: "https://images.unsplash.com/photo-1693996045435-af7c48b9cafb?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8Q3JlYXRpbmV8ZW58MHx8MHx8fDA%3D"},
        {name: "Предтрен", price: "3 500 ₽", img: "https://images.unsplash.com/photo-1693996047008-1b6210099be1?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8cHJlJTIwd29ya291dHxlbnwwfHwwfHx8MA%3D%3D"},
        {name: "Протеиновый батончик", price: "150 ₽", img: "https://images.unsplash.com/photo-1621057621391-7ed446a24b41?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8M3x8cHJvdGVpbiUyMGJhcnxlbnwwfHwwfHx8MA%3D%3D"},
        {name: "BCAA", price: "1 800 ₽", img: "https://images.unsplash.com/photo-1709976142774-ce1ef41a8378?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8QkNBQXxlbnwwfHwwfHx8MA%3D%3D"},
        {name: "Витамины", price: "900 ₽", img: "https://images.unsplash.com/photo-1712217624538-acb689745b8f?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTl8fERhaWx5JTIwVml0YW1pbnN8ZW58MHx8MHx8fDA%3D"},
        {name: "Энергетик", price: "500 ₽", img: "https://images.unsplash.com/photo-1632858280935-d5611683e434?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8RW5lcmd5JTIwRHJpbnxlbnwwfHwwfHx8MA%3D%3D"},
        {name: "Omega-3", price: "1 100 ₽", img: "https://images.unsplash.com/photo-1693996047034-311ab7656691?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8T21lZ2EtM3xlbnwwfHwwfHx8MA%3D%3D"}
    ];

    const grid = document.getElementById('product-grid');
    products.forEach(p => {
        grid.innerHTML += `
            <div class="card">
                <img src="${p.img}" alt="${p.name}">
                <h3>${p.name}</h3>
                <p style="color: #a5b4fc; font-weight: 700; font-size: 18px;">${p.price}</p>
                <button style="background: white; border: none; padding: 12px; border-radius: 12px; width: 100%; font-weight: 700; cursor: pointer;">В корзину</button>
            </div>
        `;
    });
</script>

</body>
</html>
