<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Fitness Market | Glassmorphism</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.15);
            --accent: #7c3aed;
        }

        body { 
            margin: 0; 
            background: #050505; 
            font-family: 'Inter', sans-serif; 
            color: white; 
            min-height: 100vh;
            background-image: 
                radial-gradient(at 0% 0%, #3b82f6 0px, transparent 50%),
                radial-gradient(at 100% 100%, #7c3aed 0px, transparent 50%);
            background-attachment: fixed;
        }

        .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }

        /* ГЛАВНАЯ «СТЕКЛЯННАЯ» КАРТОЧКА */
        .glass-panel { 
            background: var(--glass); 
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 40px; 
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 30px; }

        .card { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 25px; 
            padding: 20px; 
            transition: 0.4s;
        }
        .card:hover { background: rgba(255, 255, 255, 0.08); transform: translateY(-5px); }

        button { 
            background: white; color: black; border: none; padding: 12px 20px; 
            border-radius: 15px; font-weight: 700; cursor: pointer; width: 100%;
        }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .nav-btn { background: var(--glass); color: white; border: 1px solid var(--border); padding: 12px 25px; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <header class="glass-panel">
        <h2 style="margin:0">Fitness Market</h2>
        <div>
            <button class="nav-btn" onclick="alert('Мы премиум-маркет!')">О нас</button>
            <button class="nav-btn" onclick="alert('В корзине 0 товаров')">🛒 Корзина</button>
        </div>
    </header>

    <div class="grid" id="product-grid"></div>
</div>

<script>
    const products = [
        {name: "Whey Protein", price: "2 500 ₽", icon: "🥤"},
        {name: "Creatine Mono", price: "1 200 ₽", icon: "⚡"},
        {name: "Pre-workout", price: "3 500 ₽", icon: "🔥"},
        {name: "Protein Bar", price: "150 ₽", icon: "🍫"},
        {name: "BCAA Powder", price: "1 800 ₽", icon: "🧊"},
        {name: "Energy Gorilla", price: "500 ₽", icon: "🔋"},
        {name: "Vitamin D3", price: "800 ₽", icon: "☀️"},
        {name: "Omega-3", price: "1 100 ₽", icon: "🐟"}
    ];

    const grid = document.getElementById('product-grid');
    products.forEach(p => {
        grid.innerHTML += `
            <div class="card">
                <div style="font-size: 50px; text-align: center; margin-bottom: 15px;">${p.icon}</div>
                <h3 style="margin:0">${p.name}</h3>
                <p style="color: #a5b4fc; font-weight: 700; font-size: 18px;">${p.price}</p>
                <button>В корзину</button>
            </div>
        `;
    });
</script>

</body>
</html>
