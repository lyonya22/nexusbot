<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Market | Pro</title>
    <style>
        /* СИЯЮЩИЙ ФОН */
        body {
            margin: 0;
            background: #050505;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .blob {
            position: absolute;
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, #7c3aed, #3b82f6);
            filter: blur(120px);
            border-radius: 50%;
            z-index: -1;
            animation: move 10s infinite alternate;
        }

        @keyframes move { from { transform: translate(-100px, 100px); } to { transform: translate(100px, 300px); } }

        /* КАРТОЧКА СТЕКЛА */
        .glass-container {
            width: 90%;
            max-width: 450px;
            padding: 40px;
            margin-top: 50px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        h1 { font-size: 24px; margin-bottom: 25px; letter-spacing: -0.5px; }

        .product {
            background: rgba(255, 255, 255, 0.08);
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .price { font-weight: bold; color: #a5b4fc; }

        button {
            background: #fff;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:active { transform: scale(0.95); }
    </style>
</head>
<body>

<div class="blob"></div>

<div class="glass-container">
    <h1>Fitness Store 🍎</h1>

    <div class="product">
        <div>
            <div>Протеин Ultra Whey</div>
            <div class="price">2500 ₽</div>
        </div>
        <button onclick="alert('Добавлено!')">Взять</button>
    </div>

    <div class="product">
        <div>
            <div>Батончик Mega Nut</div>
            <div class="price">150 ₽</div>
        </div>
        <button onclick="alert('Добавлено!')">Взять</button>
    </div>

    <div class="product">
        <div>
            <div>BCAA Energy</div>
            <div class="price">1800 ₽</div>
        </div>
        <button onclick="alert('Довбавлено!')">Взять</button>
    </div>
</div>

</body>
</html>
