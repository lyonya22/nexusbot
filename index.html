<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Elite | Market</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --glass: rgba(255, 255, 255, 0.06); --accent: #8b5cf6; }
        body { margin: 0; background: #050505; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* Фон с анимированным градиентом */
        .glow { position: fixed; width: 600px; height: 600px; background: radial-gradient(circle, #4f46e5 0%, transparent 70%); filter: blur(120px); z-index: -1; animation: float 10s infinite; }
        @keyframes float { 0% { top: -200px; left: -200px; } 100% { top: 0px; left: 0px; } }

        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; padding: 60px 0; }
        h1 { font-size: 3rem; margin: 0; background: linear-gradient(to right, #fff, #888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        
        .card { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; padding: 20px; transition: 0.4s; }
        .card:hover { transform: translateY(-10px); border-color: var(--accent); }
        .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 20px; margin-bottom: 15px; }
        
        .qty { display: flex; align-items: center; justify-content: center; gap: 20px; margin: 15px 0; }
        .btn-main { background: var(--accent); border: none; color: white; padding: 12px 25px; border-radius: 15px; cursor: pointer; width: 100%; font-weight: 600; }
        
        .fab { position: fixed; bottom: 30px; right: 30px; background: var(--accent); padding: 20px 30px; border-radius: 50px; cursor: pointer; box-shadow: 0 10px 30px rgba(139, 92, 246, 0.3); z-index: 10; }
        
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); backdrop-filter: blur(10px); z-index: 100; justify-content: center; align-items: center; }
        .modal-content { background: #111; padding: 40px; border-radius: 40px; width: 90%; max-width: 400px; border: 1px solid #333; }
    </style>
</head>
<body>

<div class="glow"></div>

<div class="container">
    <div class="header"><h1>Fitness Elite</h1></div>
    <div class="grid" id="grid"></div>
</div>

<button class="fab" onclick="showCart()">🛒 Корзина (<span id="count">0</span>)</button>

<div class="modal" id="modal">
    <div class="modal-content">
        <h2>Ваш заказ</h2>
        <div id="cart-items"></div>
        <h3 id="total"></h3>
        <button class="btn-main" onclick="alert('Заказ успешно оплачен!')">Оплатить Apple Pay</button>
        <button onclick="document.getElementById('modal').style.display='none'" style="background:transparent; border:none; color:#666; width:100%; margin-top:15px;">Закрыть</button>
    </div>
</div>

<script>
    const products = [
        {name: "Ultra Whey", price: 2900, img: "https://images.unsplash.com/photo-1593095948071-347431b34e56?w=600", count: 0},
        {name: "Creatine Monohydrate", price: 1400, img: "https://images.unsplash.com/photo-1579722076155-ac82103f6f36?w=600", count: 0},
        {name: "Pre-Workout Energy", price: 3800, img: "https://images.unsplash.com/photo-1581009146145-b59950d3753e?w=600", count: 0},
        {name: "Protein Bar Box", price: 1200, img: "https://images.unsplash.com/photo-1626084364023-44167e721531?w=600", count: 0},
        {name: "BCAA Recovery", price: 1900, img: "https://images.unsplash.com/photo-1597403795271-e0344d9f6764?w=600", count: 0},
        {name: "Daily Vitamins", price: 900, img: "https://images.unsplash.com/photo-1584017911766-d451b3d0e843?w=600", count: 0}
    ];

    function render() {
        document.getElementById('grid').innerHTML = products.map((p, i) => `
            <div class="card">
                <img src="${p.img}">
                <h3>${p.name}</h3>
                <p>${p.price} ₽</p>
                <div class="qty">
                    <button onclick="change(${i}, -1)" style="border:none; background:#333; color:white; padding:5px 15px; border-radius:10px;">-</button>
                    <span>${p.count}</span>
                    <button onclick="change(${i}, 1)" style="border:none; background:#333; color:white; padding:5px 15px; border-radius:10px;">+</button>
                </div>
            </div>
        `).join('');
    }

    function change(i, d) {
        products[i].count = Math.max(0, products[i].count + d);
        document.getElementById('count').innerText = products.reduce((a, b) => a + b.count, 0);
        render();
    }

    function showCart() {
        const cart = products.filter(p => p.count > 0);
        document.getElementById('cart-items').innerHTML = cart.map(p => `<div>${p.name} x ${p.count}</div>`).join('');
        document.getElementById('total').innerText = "Итого: " + products.reduce((a, b) => a + (b.price * b.count), 0) + " ₽";
        document.getElementById('modal').style.display = 'flex';
    }

    render();
</script>
</body>
</html>
