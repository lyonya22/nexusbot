<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Fitness Store | Grid Layout</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #050505; color: white; font-family: 'Inter', sans-serif; }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        
        /* Сетка товаров */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 30px; }
        
        .card { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px; 
            padding: 20px; 
            text-align: center;
            transition: 0.4s;
        }
        .card:hover { border-color: #7c3aed; transform: translateY(-10px); }
        
        .img-placeholder { height: 180px; background: rgba(255,255,255,0.05); border-radius: 15px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; font-size: 50px; }
        
        .price { font-size: 20px; font-weight: 800; margin: 10px 0; color: #a5b4fc; }
        
        header { padding: 40px 0; text-align: center; }
        h1 { font-size: 40px; margin: 0; }
        
        button { background: #7c3aed; color: white; border: none; padding: 12px 25px; border-radius: 15px; cursor: pointer; width: 100%; font-weight: 600; }
    </style>
</head>
<body>

<header>
    <h1>Fitness Market</h1>
    <p style="color: #888;">Премиальное питание для ваших результатов</p>
</header>

<div class="container">
    <div class="grid" id="product-grid">
        </div>
</div>

<script>
    const products = [
        {name: "Whey Protein", price: 2500, icon: "🥤"},
        {name: "Creatine", price: 1200, icon: "⚡"},
        {name: "Pre-workout", price: 3500, icon: "🔥"},
        {name: "Protein Bar", price: 150, icon: "🍫"},
        {name: "BCAA Powder", price: 1800, icon: "🧊"},
        {name: "Energy Drink", price: 500, icon: "🔋"}
    ];

    const grid = document.getElementById('product-grid');
    products.forEach(p => {
        grid.innerHTML += `
            <div class="card">
                <div class="img-placeholder">${p.icon}</div>
                <h3>${p.name}</h3>
                <div class="price">${p.price} ₽</div>
                <button onclick="alert('Добавлено')">В корзину</button>
            </div>
        `;
    });
</script>

</body>
</html>
