<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Elite | Market</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --glass: rgba(255, 255, 255, 0.08); --accent: #7c3aed; }
        body { margin: 0; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1667832273606-c4a9e46c7d1a?w=1920&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8ODZ8fGltYWdlJTIwYmFja2dyb3VuZCUyMDNkfGVufDB8fDB8fHww'); background-size: cover; background-attachment: fixed; font-family: 'Inter', sans-serif; color: white; min-height: 100vh; }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        .filters { display: flex; gap: 10px; justify-content: center; margin-bottom: 30px; flex-wrap: wrap; }
        .filter-btn { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 10px 20px; border-radius: 20px; cursor: pointer; transition: 0.3s; }
        .filter-btn.active { background: var(--accent); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .card { background: var(--glass); backdrop-filter: blur(20px); border-radius: 25px; padding: 20px; text-align: center; transition: 0.4s; }
        .card:hover { transform: translateY(-8px); border: 1px solid var(--accent); }
        .card img { width: 100%; height: 180px; object-fit: cover; border-radius: 20px; margin-bottom: 15px; }
        .fab { position: fixed; bottom: 30px; right: 30px; background: var(--accent); padding: 20px 30px; border-radius: 50px; cursor: pointer; border: none; color: white; font-weight: 700; z-index: 100; box-shadow: 0 10px 25px rgba(124,58,237,0.4); transition: transform 0.2s; }
        .fab.animate { transform: scale(1.1); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #1a1a1a; padding: 30px; border-radius: 30px; width: 90%; max-width: 400px; text-align: center; border: 1px solid var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <header style="text-align: center; padding: 40px 0;"><h1>Fitness Elite</h1></header>
    
    <div class="filters">
        <button class="filter-btn active" onclick="renderProducts('Все', this)">Все</button>
        <button class="filter-btn" onclick="renderProducts('Протеин', this)">Протеин/Креатин</button>
        <button class="filter-btn" onclick="renderProducts('Энергия', this)">Энергетики</button>
    </div>

    <div class="grid" id="product-grid"></div>
</div>

<button class="fab" onclick="openModal()">🛒 Корзина (<span id="count">0</span>)</button>

<div class="modal" id="cart-modal">
    <div class="modal-content">
        <h2>Ваша корзина</h2>
        <div id="cart-list" style="text-align: left; margin: 20px 0;"></div>
        <h3 id="total-price">Итого: 0 ₸</h3>
        <button onclick="closeModal()" style="background: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer;">Закрыть</button>
    </div>
</div>

<script>
    const products = [
        {name: "Протеин", flavor: "Печенье-крем", price: 2500, category: "Протеин", img: "https://images.unsplash.com/photo-1693996045899-7cf0ac0229c7?w=500"},
        {name: "Протеин", flavor: "Двойной шоколад", price: 2500, category: "Протеин", img: "https://images.unsplash.com/photo-1693996045899-7cf0ac0229c7?w=500"},
        {name: "Креатин", flavor: "Клубничный милкшейк", price: 2800, category: "Протеин", img: "https://images.unsplash.com/photo-1693996045435-af7c48b9cafb?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8Y3JlYXRpbmV8ZW58MHx8MHx8fDA%3D"},
        {name: "Энергетик", flavor: "Тропический взрыв", price: 500, category: "Энергия", img: "https://images.unsplash.com/photo-1677177751361-0416255ff002?w=500"},
        {name: "Энергетик", flavor: "Ледяная вишня", price: 500, category: "Энергия", img: "https://images.unsplash.com/photo-1677177751361-0416255ff002?w=500"},
        {name: "Предтрен", flavor: "Зеленое яблоко", price: 3500, category: "Энергия", img: "https://images.unsplash.com/photo-1693996047008-1b6210099be1?w=500"}
    ];

    let cart = [];
    const grid = document.getElementById('product-grid');

    function renderProducts(filter = "Все", btn = null) {
        if(btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
        grid.innerHTML = "";
        products.filter(p => filter === "Все" || p.category === filter).forEach((p, i) => {
            grid.innerHTML += `
                <div class="card">
                    <img src="${p.img}">
                    <h3>${p.name}</h3>
                    <p style="margin:0; font-size: 14px; opacity: 0.8;">Вкус: ${p.flavor}</p>
                    <p style="color: #a5b4fc; font-weight: 700; font-size: 18px;">${p.price} ₸</p>
                    <button onclick="addToCart('${p.name}', '${p.flavor}', ${p.price})" style="background: white; border: none; padding: 10px; border-radius: 10px; width: 100%; cursor: pointer;">В корзину</button>
                </div>`;
        });
    }

    function addToCart(name, flavor, price) {
        cart.push({name, flavor, price});
        document.getElementById('count').innerText = cart.length;
        const fab = document.querySelector('.fab');
        fab.classList.add('animate');
        setTimeout(() => fab.classList.remove('animate'), 200);
    }

    function openModal() {
        const list = document.getElementById('cart-list');
        const total = cart.reduce((sum, item) => sum + item.price, 0);
        list.innerHTML = cart.length === 0 ? "Корзина пуста" : cart.map(p => `<div>${p.name} (${p.flavor}) — ${p.price} ₸</div>`).join('');
        document.getElementById('total-price').innerText = `Итого: ${total} ₸`;
        document.getElementById('cart-modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('cart-modal').style.display = 'none'; }

    renderProducts();
</script>

</body>
</html>
